; Gen 3 Shiny Odds Patcher config
; Set shiny odds as 1 in N (integer > 0)
; Set mode as one of: auto, native, reroll
; - auto: native for 1/N >= ~1/257, reroll for higher rates
; - native: vanilla-style threshold patch (errors below ~1/257)
; - reroll: high-rate mode for values like 1/256, 1/16, etc.
;
; Example values:
; odds=8192
; odds=4096
; odds=256
; odds=16
; mode=auto
; mode=native
; mode=reroll
odds=256
mode=auto
